<!DOCTYPE html>
<html>
<head>
    <title>Trang giới thiệu</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>Giới thiệu bản thân</h1>

    <p>Nhập tên của bạn:</p>
    <input type="text" id="name">

    <br>

    <button onclick="showName()">Hiển thị</button>

    <p id="result"></p>

    <br>
    <a href="index.html">Quay lại trang chính</a>

    <script>
        function showName() {
            var name = document.getElementById("name").value;
            document.getElementById("result").innerHTML = "Xin chào " + name + "!";
        }
    </script>
</body>
</html>
