<!DOCTYPE html>
<html>
<head>
    <title>Trang giới thiệu</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }

        input, select {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>Giới thiệu bản thân</h1>

    <p>Nhập tên của bạn:</p>
    <input type="text" id="name">

    <p>Chọn tuổi của bạn:</p>
    <select id="age">
        <option value="">-- Chọn tuổi --</option>
        <option value="18">18</option>
        <option value="19">19</option>
        <option value="20">20</option>
        <option value="21">21</option>
        <option value="22">22</option>
    </select>

    <br>

    <button onclick="showInfo()">Hiển thị</button>

    <p id="result"></p>

    <br>
    <a href="index.html">Quay lại trang chính</a>

    <script>
        function showInfo() {
            var name = document.getElementById("name").value;
            var age = document.getElementById("age").value;

            if(name === "" || age === "") {
                document.getElementById("result").innerHTML = "Vui lòng nhập đầy đủ!";
            } else {
                document.getElementById("result").innerHTML = 
                    "Xin chào " + name + ", bạn " + age + " tuổi!";
            }
        }
    </script>
</body>
</html>
